name: Sync upstream

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    name: Merge LabyMod/server-media
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Merge upstream/master
        # A merge (not a reset) keeps fork-only files (CNAME, workflows, scripts).
        # Conflicts fail the job on purpose — resolve them manually.
        run: |
          git remote add upstream https://github.com/LabyMod/server-media.git
          git fetch upstream master
          git merge upstream/master --no-edit
      - name: Push to origin
        run: git push origin master
